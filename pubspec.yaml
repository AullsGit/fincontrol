name: fincontrol
description: FinControl - Gestão Financeira Pessoal para Moçambique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1


  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Storage (offline)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  lottie: ^3.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.1
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/